<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Admin login - {{APP_TITLE}}</title>
	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/site.webmanifest">
	<meta name="theme-color" content="#ff9f09">
	<link rel="stylesheet" href="/css/tokens.css">
	<link rel="stylesheet" href="/css/app.css">
	<link rel="modulepreload" href="/js/shared.js">
	<link rel="modulepreload" href="/js/sidebar.js">
	{{BRAND_STYLE}}
</head>
<body class="rl-side-on">
	<div class="rl-aurora"></div>
	<template id="rl-brand">{{APP_NAME}}</template>
	<div class="rl-app">
		<main class="rl-container">
			<div style="max-width:380px;margin:var(--rl-space-12) auto 0">
				<form id="login-form" class="rl-card rl-stack">
					<div class="rl-center">
						<h1 class="rl-h2">Admin</h1>
						<p class="rl-muted">Sign in to manage shares.</p>
					</div>
					<div class="rl-field">
						<label class="rl-label" for="login-password">Password</label>
						<input id="login-password" class="rl-input" type="password" placeholder="Admin password" autocomplete="current-password" autofocus />
					</div>
					<button id="login-btn" class="rl-btn rl-btn-primary rl-btn-block" type="submit">Login</button>
				</form>
			</div>
		</main>
	</div>
	<script type="module" src="/js/login.js"></script>
</body>
</html>
