<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="dark" />
		<title>{{APP_TITLE}}</title>
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#ff9f09" />
		<link rel="stylesheet" href="/css/app.css" />
	</head>
	<body>
		<div class="rl-aurora"></div>
		<template id="rl-brand">{{APP_NAME}}</template>
		<div class="rl-app">
			<main class="rl-container">
				<form id="lock-form" class="rl-card rl-stack" style="max-width: 380px; margin: var(--rl-space-12) auto 0">
					<div class="rl-field">
						<label class="rl-label" for="lock-password">Upload password</label>
						<input id="lock-password" class="rl-input" type="password" autocomplete="current-password" autofocus />
					</div>
					<button id="lock-btn" class="rl-btn rl-btn-primary rl-btn-block" type="submit">Unlock</button>
					<p id="lock-error" class="rl-help rl-text-danger rl-hidden"></p>
				</form>
			</main>
		</div>
		<script type="module" src="/js/lock.js"></script>
	</body>
</html>
