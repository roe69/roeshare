<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Admin - {{APP_TITLE}}</title>
	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/site.webmanifest">
	<meta name="theme-color" content="#ff9f09">
	<link rel="stylesheet" href="/css/app.css">
</head>
<body>
	<div class="rl-aurora"></div>

	<button id="side-toggle" class="rl-side-toggle" type="button" aria-label="Open menu">&#9776;</button>

	<div class="rl-admin" id="admin">
		<div class="rl-side-backdrop" id="side-backdrop"></div>

		<aside class="rl-side">
			<a class="rl-side-brand" href="/" title="{{APP_TITLE}}">
				<img src="/favicon-32x32.png" alt="" width="26" height="26">
				<span>{{APP_NAME}}</span>
			</a>

			<nav class="rl-side-nav" id="side-nav" aria-label="Admin sections">
				<span class="rl-side-group">Dashboard</span>
				<button class="rl-side-item" type="button" data-view="overview">
					<span class="rl-side-ico" aria-hidden="true">&#8962;</span><span class="rl-side-label">Overview</span>
				</button>
				<button class="rl-side-item" type="button" data-view="shares">
					<span class="rl-side-ico" aria-hidden="true">&#9638;</span><span class="rl-side-label">Shares</span>
				</button>
				<button class="rl-side-item" type="button" data-view="server">
					<span class="rl-side-ico" aria-hidden="true">&#9636;</span><span class="rl-side-label">Server</span>
				</button>
				<button class="rl-side-item" type="button" data-view="logs">
					<span class="rl-side-ico" aria-hidden="true">&#8803;</span><span class="rl-side-label">Logs</span>
				</button>

				<span class="rl-side-group">Site</span>
				<a class="rl-side-item" href="/">
					<span class="rl-side-ico" aria-hidden="true">&#8593;</span><span class="rl-side-label">Upload</span>
				</a>
				<a class="rl-side-item" href="/mine">
					<span class="rl-side-ico" aria-hidden="true">&#9670;</span><span class="rl-side-label">My shares</span>
				</a>
			</nav>

			<div class="rl-side-foot">
				<div class="rl-side-account">
					<span class="rl-side-avatar" aria-hidden="true">A</span>
					<span class="rl-side-who">Admin</span>
					<button id="side-logout" class="rl-side-logout" type="button" title="Log out" aria-label="Log out">&#9099;</button>
				</div>
				<button id="side-collapse" class="rl-side-collapse" type="button" aria-label="Collapse sidebar">
					<span class="rl-side-ico" aria-hidden="true">&#10216;</span><span class="rl-side-label">Collapse</span>
				</button>
			</div>
		</aside>

		<main class="rl-admin-main" id="view">
			<div class="rl-center rl-muted" style="padding:var(--rl-space-12)">
				<span class="rl-spinner"></span>
			</div>
		</main>
	</div>

	<script type="module" src="/js/admin.js"></script>
</body>
</html>
