# RoeShare, built from this source checkout. Set ADMIN_PASSWORD and SECRET
# below, then:
#
#   docker compose up -d --build
#
# (Just want to run RoeShare without cloning? Use the prebuilt image instead -
# see the README's Quick start.)
services:
  roeshare:
    build: .
    image: roeshare:latest
    container_name: roeshare
    restart: unless-stopped
    # Host port: change the left-hand 3300; the container itself always
    # listens on 3300.
    ports:
      - "3300:3300"
    environment:
      ADMIN_PASSWORD: change-me # admin panel login - change this
      # Signs cookies/tokens and derives the at-rest encryption key. Generate
      # one with `openssl rand -hex 32`. Back it up - losing it makes
      # encrypted uploads unrecoverable. If left empty, an ephemeral one is
      # generated each start (sessions and access tokens reset on restart).
      SECRET: ""
      BASE_URL: http://localhost:3300 # public URL used in share links/QR codes

      # Uncomment to set; see the README's Configuration table for the full list.
      # UPLOAD_PASSWORD: ""
      # TRUST_PROXY: "1"
      # APP_NAME: "<col=e4e4ce>Roe<b><col=ff6b35>Share</b>"
      # DEFAULT_EXPIRY: "604800"
      # MAX_FILE_SIZE: "5368709120"
    volumes:
      - roeshare-data:/data

volumes:
  roeshare-data:
