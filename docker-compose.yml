# RoeShare, built from this source checkout. Set ADMIN_PASSWORD and SECRET
# below, then:
#
#   docker compose up -d --build
#
# (Just want to run RoeShare without cloning? Use the prebuilt image instead -
# see the README's Quick start.)
services:
  roeshare:
    build: .
    image: roeshare:latest
    container_name: roeshare
    restart: unless-stopped
    # Drop every Linux capability (the app needs none - it's a plain Bun
    # process listening on an unprivileged port) and block privilege
    # escalation via setuid/setgid binaries or file capabilities.
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    # Resource ceiling so a runaway upload/compression workload can't take
    # down the host. Bump if legitimate traffic gets OOM-killed or throttled.
    mem_limit: "1g"
    cpus: "2"
    # Read-only root filesystem: every write the app makes (SQLite db + WAL,
    # blob storage, .secret, settings.env, backups) goes through DATA_DIR
    # (src/config.js), which is the /data volume below - nothing is ever
    # written under /app. The only other writable path the base image/Bun
    # runtime may want is /tmp, given here as a small in-memory tmpfs so it
    # never persists or grows the container's writable layer. Verified by
    # running the built image with --read-only --tmpfs /tmp: it boots,
    # migrates, and serves /health healthy.
    read_only: true
    tmpfs:
      - /tmp
    # Host port: change the left-hand 3300; the container itself always
    # listens on 3300.
    ports:
      - "3300:3300"
    environment:
      # Admin panel login. Must be set to a real password or the admin panel
      # is locked out entirely (the app fails closed when this is empty).
      ADMIN_PASSWORD: ""
      # Signs cookies/tokens and derives the at-rest encryption key. Generate
      # one with `openssl rand -hex 32`. Back it up - losing it makes
      # encrypted uploads unrecoverable. If left empty, an ephemeral one is
      # generated each start (sessions and access tokens reset on restart).
      SECRET: ""
      BASE_URL: http://localhost:3300 # public URL used in share links/QR codes

      # Uncomment to set; see the README's Configuration table for the full list.
      # UPLOAD_PASSWORD: ""
      # Trust a reverse proxy's X-Forwarded-* headers ONLY from these peer
      # addresses (CIDRs); TRUST_PROXY=1 alone is a back-compat alias for
      # loopback-only. See the README's "HTTPS (reverse proxy)" section.
      # TRUSTED_PROXY_CIDRS: "127.0.0.1/32,::1/128"
      # TRUSTED_PROXY_HOPS: "1"
      # TRUST_PROXY: "1"
      # APP_NAME: "<col=e4e4ce>Roe<b><col=ff6b35>Share</b>"
      # DEFAULT_EXPIRY: "604800"
      # MAX_FILE_SIZE: "5368709120"
    volumes:
      - roeshare-data:/data

volumes:
  roeshare-data:
