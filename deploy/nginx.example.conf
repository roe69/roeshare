# Example nginx config for putting RoeShare behind nginx with TLS termination
# AND the X-Accel-Redirect sendfile offload enabled. Copy this to somewhere like
# /etc/nginx/sites-available/roeshare.conf, replace example.com and the paths
# below, then `nginx -t && systemctl reload nginx`.
#
# What this buys you: the preview endpoint (GET .../files/:fileId/preview) hands
# off any blob that needs no server-side decryption - every E2E share, and
# non-E2E files when ENCRYPT_AT_REST=0 - to nginx, which serves it straight off
# disk with sendfile() instead of the app streaming the bytes itself. Encrypted-
# at-rest files still stream through the app as normal (nginx can't decrypt
# them), and /download and /download-all are never offloaded (they need to run
# in the app for download counting / one-time burn).
#
# Required app-side env (set these in docker-compose.yml or your environment,
# NOT here):
#   TRUST_PROXY=1
#   X_ACCEL_REDIRECT=/_roeshare_blobs
#
# Redirect plain HTTP to HTTPS.
server {
	listen 80;
	listen [::]:80;
	server_name example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name example.com;

	# TLS certs - e.g. from certbot/Let's Encrypt. Adjust paths to your setup.
	ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

	# Uploads can be large (RoeShare chunks them, but don't let nginx cap a
	# single request body). Set to a specific size instead of 0 if you'd rather
	# cap it explicitly.
	client_max_body_size 0;

	# Long-lived downloads/uploads/video streams must not be cut off by an
	# idle proxy timeout.
	proxy_read_timeout 3600s;
	proxy_send_timeout 3600s;

	location / {
		proxy_pass http://127.0.0.1:3300;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Real-IP $remote_addr;
		# Preview/download responses can be large; let sendfile/proxy buffering
		# stay off the app for offloaded blobs (handled by the internal location
		# below), and keep buffering sane for everything else.
		proxy_buffering on;
	}

	# Internal location matching X_ACCEL_REDIRECT=/_roeshare_blobs (the prefix
	# must match exactly). `internal;` means this location can ONLY be reached
	# via an X-Accel-Redirect from the app - nginx returns 404 if a client
	# requests it directly, so the app's access checks (password/one-time/etc.)
	# still gate every preview; this location just serves the bytes once the
	# app has already said "yes, serve this one".
	#
	# The alias MUST point at DATA_DIR/storage on a path nginx (running as its
	# own OS user, e.g. www-data) can read:
	#   - Bare-metal/non-Docker app: this is simply <DATA_DIR>/storage, e.g.
	#     /opt/roeshare/data/storage if DATA_DIR=/opt/roeshare/data.
	#   - Dockerized app + nginx on the host: the default docker-compose.yml
	#     uses a named volume (roeshare-data:/data), which nginx on the host
	#     cannot read directly. Change the volume to a bind mount instead, e.g.
	#     in docker-compose.yml:
	#         volumes:
	#           - /opt/roeshare/data:/data
	#     so the container's /data/storage is also visible on the host at
	#     /opt/roeshare/data/storage, which is what the alias below points at.
	location /_roeshare_blobs/ {
		internal;
		alias /opt/roeshare/data/storage/;
	}
}
