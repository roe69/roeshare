# Production overlay, layered over the base docker-compose.yml by
# .github/workflows/deploy.yml. Secrets arrive as environment variables from
# GitHub repository secrets at deploy time; nothing secret lives in git or on
# the host.
services:
  roeshare:
    image: roe69/roeshare:latest
    # Host port the reverse proxy forwards to.
    ports: !override
      - "6968:3300"
    environment:
      BASE_URL: ${BASE_URL}
      TRUST_PROXY: "1"
      # Cloudflare (orange-cloud DNS) connects to this host's public IP on the
      # published port; there is no local nginx/Caddy for this site. Verified
      # empirically against the live instance (temporary /health/debug-peer
      # diagnostic, removed again immediately after use): the socket peer the
      # app actually sees is this VM's provider-assigned private/NAT address,
      # NOT a Cloudflare edge IP directly - the cloud provider NATs all
      # inbound traffic onto it before Docker's own port-forwarding ever sees
      # it. X-Forwarded-For arrives as TWO entries ("<real client>,
      # <Cloudflare-internal relay ip>"), matching CF-Connecting-IP in the
      # first position - so HOPS=1 (skip the trailing Cloudflare-internal
      # entry) is correct here, not 0.
      #
      # IMPORTANT: because the peer is this VM's own NAT address rather than
      # something Cloudflare-specific, trusting it is only as safe as the
      # host's firewall - anyone who finds this VM's real public IP and
      # connects to :6968 directly would present the SAME peer address and
      # have their forged X-Forwarded-For fully believed. Restrict the
      # provider firewall/security group for this port to Cloudflare's
      # published ranges (https://www.cloudflare.com/ips/) so a direct hit is
      # dropped before it ever reaches Docker - see DEPLOY.md.
      TRUSTED_PROXY_CIDRS: "127.0.0.1/32,::1/128,192.168.100.2/32"
      TRUSTED_PROXY_HOPS: "1"
      # New shares default to server-managed encryption; uploaders can still
      # opt in to E2E per share in the UI.
      DEFAULT_E2E: "0"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_PASSWORD: ${UPLOAD_PASSWORD:-}
      SECRET: ${SECRET}
