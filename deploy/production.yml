# Production overlay, layered over the base docker-compose.yml by
# .github/workflows/deploy.yml. Secrets arrive as environment variables from
# GitHub repository secrets at deploy time; nothing secret lives in git or on
# the host.
services:
  roeshare:
    image: roe69/roeshare:latest
    # 127.0.0.1: only the local reverse proxy can reach the app (TRUST_PROXY=1
    # would let direct visitors spoof their IP otherwise).
    ports: !override
      - "127.0.0.1:6968:3300"
    environment:
      BASE_URL: https://share.example.com,https://files.example.com
      TRUST_PROXY: "1"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_PASSWORD: ${UPLOAD_PASSWORD:-}
      SECRET: ${SECRET}
