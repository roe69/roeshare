# Production overlay, layered over the base docker-compose.yml by
# .github/workflows/deploy.yml. Secrets arrive as environment variables from
# GitHub repository secrets at deploy time; nothing secret lives in git or on
# the host.
services:
  roeshare:
    image: roe69/roeshare:latest
    # Host port the reverse proxy forwards to.
    ports: !override
      - "6968:3300"
    environment:
      BASE_URL: ${BASE_URL}
      TRUST_PROXY: "1"
      # Cloudflare (orange-cloud DNS) connects DIRECTLY to this host's public
      # IP on the published port - there is no local nginx/Caddy in front of
      # this specific site, so the socket peer the app sees on every request
      # is one of Cloudflare's own edge IPs. Trust exactly Cloudflare's
      # published edge ranges (https://www.cloudflare.com/ips/ - re-check
      # periodically, they change rarely but do change) rather than any
      # Docker-internal range. HOPS=0 because Cloudflare is the ONE hop that
      # terminates the client connection and SETS X-Forwarded-For to the real
      # visitor IP itself (it does not relay/append to an existing chain from
      # a further upstream proxy, since there is no such proxy here) - so its
      # single XFF entry already IS the client, nothing gets skipped.
      TRUSTED_PROXY_CIDRS: "127.0.0.1/32,::1/128,173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      TRUSTED_PROXY_HOPS: "0"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_PASSWORD: ${UPLOAD_PASSWORD:-}
      SECRET: ${SECRET}
