name: Deploy RoeShare

# Runs after "Publish Docker image" succeeds: a self-hosted runner on the
# target server pulls the published image and swaps the container onto it -
# the server never builds. Instance config lives in deploy/production.yml;
# secrets are injected from repository secrets (ADMIN_PASSWORD,
# UPLOAD_PASSWORD, SECRET). Data lives in a named volume, so redeploys - and
# swapping in a fresh runner box - keep uploads and the db.

on:
  workflow_run:
    workflows: ["Publish Docker image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      reset_data:
        description: "Wipe the data volume before deploying (DELETES all shares, uploads, and stats - needed after a schema change)"
        type: boolean
        default: false

# One deploy at a time; a newer publish cancels an in-flight (older) deploy.
concurrency:
  group: roeshare-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    # Deploy after a successful publish, or on manual dispatch; skip when the
    # publish failed or was cancelled.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    # Any self-hosted runner. To pin to one box, add a label here and to the
    # runner, e.g. [self-hosted, roeshare]. Assumes a Linux runner with Docker
    # Engine + the Compose v2 plugin already installed.
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash
    env:
      # Base compose from the checkout + the production overlay, read in place.
      COMPOSE_FILE: docker-compose.yml:deploy/production.yml
      # Fixed project name -> stable container ("roeshare") and volume
      # ("roeshare_roeshare-data") no matter which runner/path runs this.
      COMPOSE_PROJECT_NAME: roeshare
      # Interpolated into deploy/production.yml by every compose call below.
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      UPLOAD_PASSWORD: ${{ secrets.UPLOAD_PASSWORD }}
      SECRET: ${{ secrets.SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight (Docker + secrets)
        run: |
          set -euo pipefail
          command -v docker >/dev/null \
            || { echo "::error::Docker is not installed on this runner."; exit 1; }
          docker compose version >/dev/null 2>&1 \
            || { echo "::error::Docker Compose v2 plugin not available."; exit 1; }
          [ -n "$ADMIN_PASSWORD" ] \
            || { echo "::error::Repository secret ADMIN_PASSWORD is not set."; exit 1; }
          [ -n "$SECRET" ] \
            || { echo "::error::Repository secret SECRET is not set."; exit 1; }

      - name: Deploy
        run: |
          set -euo pipefail
          # Opt-in reset: only when this workflow is run manually with reset_data
          # checked. Removes the container AND the named data volume, so the next
          # `up` starts from an empty database with the current schema. This is the
          # deliberate way to apply a schema change (there is no migration code).
          if [ "${{ inputs.reset_data }}" = "true" ]; then
            echo "reset_data=true: wiping the data volume (all shares, uploads, and stats)."
            docker compose down -v --remove-orphans || true
          fi
          docker compose pull roeshare
          docker compose up -d --no-build --remove-orphans
          docker image prune -f >/dev/null 2>&1 || true

      - name: Health check
        run: |
          set -euo pipefail
          # Resolve the actual published host port from Docker.
          PORT="$(docker compose port roeshare 3300 | awk -F: '{print $NF}' | tr -d '[:space:]')"
          PORT="${PORT:-3300}"
          echo "Waiting for RoeShare to report healthy on 127.0.0.1:${PORT} ..."
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${PORT}/healthz" >/dev/null 2>&1; then
              echo "Healthy:"; curl -fsS "http://127.0.0.1:${PORT}/healthz"; echo
              exit 0
            fi
            sleep 2
          done
          echo "::error::RoeShare did not become healthy within ~60s. Recent logs:"
          docker compose logs --tail=80 roeshare || true
          exit 1
