name: Publish Docker image

# Build and push the prebuilt image users run without cloning this repo:
#   roe69/roeshare:latest    (every push to main)
#   roe69/roeshare:X.Y.Z     (on vX.Y.Z tags)
# Multi-arch (amd64 + arm64), so it runs on ARM boxes and Raspberry Pis too.
#
# Needs two repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME - the Docker Hub account (roe69)
#   DOCKERHUB_TOKEN    - a Docker Hub access token with read & write scope
#                        (Docker Hub -> Account settings -> Security)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: roeshare-publish
  cancel-in-progress: true

jobs:
  test:
    # Boots the app against a fresh, an already-current-shape, and a
    # simulated pre-migration database and asserts none of them lose data or
    # fail to start - the exact class of bug that took prod down once
    # already (see test/migrations.test.js). A schema/data-format change
    # that breaks upgrade compatibility fails here, before an image is ever
    # published or a deploy is ever triggered.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Run tests
        run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: roe69/roeshare
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
