name: Publish Docker image

# Build and push the prebuilt image users run without cloning this repo:
#   roe69/roeshare:latest    (every push to main)
#   roe69/roeshare:X.Y.Z     (on vX.Y.Z tags)
# Multi-arch (amd64 + arm64), so it runs on ARM boxes and Raspberry Pis too.
#
# Needs two repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME - the Docker Hub account (roe69)
#   DOCKERHUB_TOKEN    - a Docker Hub access token with read & write scope
#                        (Docker Hub -> Account settings -> Security)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: roeshare-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: roe69/roeshare
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
